syntax = "proto3";

option go_package = "chainmaker.org/chainmaker-go/docker-go/dockercontainer/pb/protogo/outside";

package outside;

message TxRequest {

    string tx_id = 1;

    string contract_name = 2;

    string contract_version = 3;

    string method = 4;

    bytes byteCode = 5;

    map<string, string> parameters = 6;

//    SimContext simContext = 5;
}


